# esdata - Railway monorepo configuration
# Each service specifies its root directory for Nixpacks

# --- API ---
[[services]]
name = "api"
rootDirectory = "apps/api"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- BOE Worker (long-running) ---
[[services]]
name = "worker-boe"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python boe.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: BOE daily ---
[[services]]
name = "cron-boe-daily"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python boe.py --run-once"

[services.cron]
schedule = "0 6 * * *"
