# esdata - Railway monorepo configuration
# Each service specifies its root directory for Nixpacks

# --- API ---
[[services]]
name = "api"
rootDirectory = "apps/api"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- BOE Worker (long-running) ---
[[services]]
name = "worker-boe"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python -m workers.boe"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Doctrina Worker (long-running) ---
[[services]]
name = "worker-doctrina"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python -m workers.doctrina"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: BOE daily ---
[[services]]
name = "cron-boe-daily"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python -m workers.boe --run-once"

[services.cron]
schedule = "0 6 * * *"

# --- Cron: Doctrina weekly ---
[[services]]
name = "cron-doctrina-weekly"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python -m workers.doctrina --run-once"

[services.cron]
schedule = "0 7 * * 1"
