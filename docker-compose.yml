services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: esdata
      POSTGRES_PASSWORD: esdata_dev
      POSTGRES_DB: esdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esdata -d esdata"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://esdata:esdata_dev@postgres:5432/esdata
      REDIS_URL: redis://redis:6379
      APP_ENV: development
      ESDATA_API_KEY: dev-key
      MCP_API_KEY: dev-mcp-key
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./alembic.ini:/app/alembic.ini:ro
      - ./alembic:/app/alembic:ro
    command: sh -c "alembic upgrade heads && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5

  worker-boe:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://esdata:esdata_dev@postgres:5432/esdata
      BOE_API_BASE: https://www.boe.es/datosabiertos/api/legislacion-consolidada
      BOE_LEGISLACION_NORMAS: LIVA,LIRPF,LIS,LGT,ITPAJD
      SYNC_INTERVAL_SECONDS: "3600"
    depends_on:
      api:
        condition: service_healthy
    command: python boe.py

volumes:
  pgdata:
