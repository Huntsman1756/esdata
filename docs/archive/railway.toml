# esdata - Railway monorepo configuration
# Each service specifies its root directory for Nixpacks

# --- API ---
[[services]]
name = "esdata"
rootDirectory = "apps/api"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- BOE Worker (long-running) ---
[[services]]
name = "worker-boe"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python boe.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: BOE daily ---
[[services]]
name = "cron-boe-daily"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python boe.py --run-once"

[services.cron]
schedule = "0 6 * * *"

# --- DGT Worker (long-running) ---
[[services]]
name = "worker-dgt"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python dgt.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: DGT weekly ---
[[services]]
name = "cron-dgt-weekly"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python dgt.py --run-once"

[services.cron]
schedule = "0 7 * * 1"

# --- TEAC Worker (long-running) ---
[[services]]
name = "worker-teac"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python teac.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: TEAC weekly ---
[[services]]
name = "cron-teac-weekly"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python teac.py --run-once"

[services.cron]
schedule = "0 8 * * 1"

# --- Modelos Worker (long-running — auto-scrapes AEAT for model content) ---
[[services]]
name = "worker-modelos"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python modelos.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --- Cron: Modelos daily (refresh campaigns, casillas, instructions) ---
[[services]]
name = "cron-modelos-daily"
rootDirectory = "apps/workers"

[services.deploy]
startCommand = "python modelos.py --run-once"

[services.cron]
schedule = "0 5 * * *"

# --- Web (Next.js frontend) ---
[[services]]
name = "web"
rootDirectory = "apps/web"

[services.deploy]
startCommand = "npm run build && npm start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
