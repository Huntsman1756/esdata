name: Deploy

on:
  push:
    branches: [main]

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: 41c53da7-ba65-4308-9713-8c3a5e4e7706

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link Railway project
        run: railway link --project $RAILWAY_PROJECT_ID

      - name: Ensure DGT services exist in Railway
        shell: bash
        run: |
          set -euo pipefail
          status_json="$(railway status --json)"
          if ! printf '%s' "$status_json" | grep -q '"worker-dgt"'; then
            railway add --service worker-dgt
          fi
          if ! printf '%s' "$status_json" | grep -q '"cron-dgt-weekly"'; then
            railway add --service cron-dgt-weekly
          fi

      - name: Deploy API a Railway
        run: railway up --service esdata --project $RAILWAY_PROJECT_ID --token $RAILWAY_TOKEN

      - name: Deploy BOE worker a Railway
        run: railway up --service worker-boe --project $RAILWAY_PROJECT_ID --token $RAILWAY_TOKEN

      - name: Deploy BOE daily cron a Railway
        run: railway up --service cron-boe-daily --project $RAILWAY_PROJECT_ID --token $RAILWAY_TOKEN

      - name: Deploy DGT worker a Railway
        run: railway up --service worker-dgt --project $RAILWAY_PROJECT_ID --token $RAILWAY_TOKEN

      - name: Deploy DGT weekly cron a Railway
        run: railway up --service cron-dgt-weekly --project $RAILWAY_PROJECT_ID --token $RAILWAY_TOKEN

      - name: Smoke tests funcionales
        env:
          API_BASE: https://esdata-production.up.railway.app
        run: |
          python - <<'EOF'
          import os
          import sys

          import httpx

          base = os.environ["API_BASE"]
          checks = [
              ("/health", 200, None),
              ("/v1/legislacion/LIVA/articulos/91", 200, "texto"),
              ("/v1/materias/tipo-reducido-iva", 200, "articulos"),
              ("/v1/legislacion/buscar?q=tipo+reducido&norma=LIVA", 200, "resultados"),
              ("/v1/legislacion/cobertura", 200, "normas"),
              ("/status", 200, "workers"),
          ]

          failed = []
          for path, expected_status, expected_key in checks:
              r = httpx.get(f"{base}{path}", timeout=10)
              if r.status_code != expected_status:
                  failed.append(f"FAIL {path}: status {r.status_code} (esperado {expected_status})")
                  continue
              if expected_key and expected_key not in r.json():
                  failed.append(f"FAIL {path}: clave '{expected_key}' ausente en respuesta")

          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print(f"Smoke tests OK ({len(checks)} checks)")
          EOF

      - name: Purge Cloudflare cache (solo paths deterministas)
        if: success()
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["api.esdata.org/v1/legislacion/","api.esdata.org/v1/materias/"]}'
