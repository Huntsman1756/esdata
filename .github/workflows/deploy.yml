# [DEPRECATED] Railway deploy workflow
#
# Despliegue activo: Docker Compose. Este archivo se conserva solo para dejar
# visible que el workflow historico queda desactivado y no ejecuta despliegues.

name: Deploy Deprecated

on:
  workflow_dispatch:
    inputs:
      confirm_disabled:
        description: "Deprecated workflow; use Docker Compose deployment instead."
        required: true
        default: "disabled"

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Deprecated deployment disabled
        run: |
          echo "This historical deployment workflow is disabled."
          echo "Use the active Docker Compose deployment workflow and runbooks instead."
