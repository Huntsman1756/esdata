name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API a Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api

      # Railway resuelve DATABASE_URL internamente — no necesitamos el secret aquí
      - name: Run DB migrations (dentro del entorno Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway run --service api python -m alembic upgrade head

      # --- Ajuste 6: smoke tests jurídicos post-deploy ---
      - name: Smoke tests funcionales
        env:
          API_BASE: https://api.esdata.org
        run: |
          python - <<'EOF'
          import httpx, sys

          base = "$API_BASE"
          checks = [
              ("/health",                                          200, None),
              ("/v1/legislacion",                                  200, None),
              ("/v1/legislacion/LIVA/articulos/91",                200, "texto"),
              ("/v1/materias/tipo-reducido-iva",                   200, "articulos"),
              ("/v1/legislacion/buscar?q=tipo+reducido&norma=LIVA",200, "resultados"),
              ("/status",                                          200, "workers"),
          ]

          failed = []
          for path, expected_status, expected_key in checks:
              r = httpx.get(f"{base}{path}", timeout=10)
              if r.status_code != expected_status:
                  failed.append(f"FAIL {path}: status {r.status_code} (esperado {expected_status})")
                  continue
              if expected_key and expected_key not in r.json():
                  failed.append(f"FAIL {path}: clave '{expected_key}' ausente en respuesta")

          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print(f"Smoke tests OK ({len(checks)} checks)")
          EOF

      # --- Ajuste 4: purge solo en paths deterministas (no /buscar) ---
      - name: Purge Cloudflare caché (solo paths deterministas)
        if: success()
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["api.esdata.org/v1/legislacion/","api.esdata.org/v1/materias/"]}'
          # Nota: /v1/legislacion/buscar se excluye — las búsquedas con
          # vigente_en, filtros o confianza dinámica no son deterministas.
