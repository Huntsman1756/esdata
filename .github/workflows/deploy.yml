name: Deploy

on:
  push:
    branches: [main]

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: 41c53da7-ba65-4308-9713-8c3a5e4e7706
  RAILWAY_ENVIRONMENT: production
  CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API a Railway
        run: railway up --service esdata --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy BOE worker a Railway
        run: railway up --service worker-boe --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy BOE daily cron a Railway
        run: railway up --service cron-boe-daily --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy DGT worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-dgt --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-dgt --json
            railway up apps/workers --path-as-root --service worker-dgt --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy DGT weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-dgt-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-dgt-weekly --json
            railway up apps/workers --path-as-root --service cron-dgt-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy TEAC worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-teac --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-teac --json
            railway up apps/workers --path-as-root --service worker-teac --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy TEAC weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-teac-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-teac-weekly --json
            railway up apps/workers --path-as-root --service cron-teac-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy BDNS worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-bdns --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-bdns --json
            railway up apps/workers --path-as-root --service worker-bdns --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy BDNS weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-bdns-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-bdns-weekly --json
            railway up apps/workers --path-as-root --service cron-bdns-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy BORME worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-borme --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-borme --json
            railway up apps/workers --path-as-root --service worker-borme --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy BORME weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-borme-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-borme-weekly --json
            railway up apps/workers --path-as-root --service cron-borme-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy CNMV worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-cnmv --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-cnmv --json
            railway up apps/workers --path-as-root --service worker-cnmv --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy CNMV weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-cnmv-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-cnmv-weekly --json
            railway up apps/workers --path-as-root --service cron-cnmv-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Espera breve tras deploy
        run: sleep 20

      - name: Smoke tests funcionales
        env:
          API_BASE: https://esdata-production.up.railway.app
        run: python scripts/smoke-check.py --base-url "$API_BASE"

      - name: Purge Cloudflare cache (solo paths deterministas)
        if: success() && env.CF_ZONE_ID != '' && env.CF_API_TOKEN != ''
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["api.esdata.org/v1/legislacion/","api.esdata.org/v1/materias/"]}'
