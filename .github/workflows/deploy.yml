name: Deploy

on:
  push:
    branches: [main]

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: 41c53da7-ba65-4308-9713-8c3a5e4e7706
  RAILWAY_ENVIRONMENT: production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API a Railway
        run: railway up apps/api --path-as-root --service esdata --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy BOE worker a Railway
        run: railway up apps/workers --path-as-root --service worker-boe --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy BOE daily cron a Railway
        run: railway up apps/workers --path-as-root --service cron-boe-daily --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach

      - name: Deploy DGT worker a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service worker-dgt --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service worker-dgt --json
            railway up apps/workers --path-as-root --service worker-dgt --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Deploy DGT weekly cron a Railway
        shell: bash
        run: |
          set -euo pipefail
          if ! railway up apps/workers --path-as-root --service cron-dgt-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach; then
            railway add --service cron-dgt-weekly --json
            railway up apps/workers --path-as-root --service cron-dgt-weekly --project $RAILWAY_PROJECT_ID --environment $RAILWAY_ENVIRONMENT --detach
          fi

      - name: Espera breve tras deploy
        run: sleep 20

      - name: Smoke tests funcionales
        env:
          API_BASE: https://esdata-production.up.railway.app
        run: |
          python - <<'EOF'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          base = os.environ["API_BASE"]
          checks = [
              ("/health", 200, None),
              ("/v1/legislacion/LIVA/articulos/91", 200, "texto"),
              ("/v1/materias/tipo-reducido-iva", 200, "articulos"),
              ("/v1/legislacion/buscar?q=tipo+reducido&norma=LIVA", 200, "resultados"),
              ("/v1/legislacion/cobertura", 200, "normas"),
              ("/status", 200, "workers"),
          ]

          failed = []
          for path, expected_status, expected_key in checks:
              last_error = None
              for _ in range(10):
                  try:
                      with urllib.request.urlopen(f"{base}{path}", timeout=10) as response:
                          status_code = response.getcode()
                          payload = json.loads(response.read().decode("utf-8"))

                      if status_code == expected_status and (
                          not expected_key or expected_key in payload
                      ):
                          last_error = None
                          break
                      last_error = (
                          f"status {status_code} (esperado {expected_status})"
                          if status_code != expected_status
                          else f"clave '{expected_key}' ausente en respuesta"
                      )
                  except urllib.error.HTTPError as exc:
                      last_error = f"status {exc.code} (esperado {expected_status})"
                  except Exception as exc:
                      last_error = str(exc)
                  time.sleep(5)

              if last_error is not None:
                  failed.append(f"FAIL {path}: {last_error}")

          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print(f"Smoke tests OK ({len(checks)} checks)")
          EOF

      - name: Purge Cloudflare cache (solo paths deterministas)
        if: success()
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"prefixes":["api.esdata.org/v1/legislacion/","api.esdata.org/v1/materias/"]}'
