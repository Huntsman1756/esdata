name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check apps/ libs/ scripts/

      - name: Run ruff format check
        run: ruff format --check apps/ libs/ scripts/

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "docs/**/*.md"
          config: .markdownlint-cli2.yaml

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r apps/api/requirements.txt
          pip install -r apps/workers/requirements.txt

      - name: Run mypy on core modules
        run: mypy apps/api/libs/python/esdata_common --ignore-missing-imports

  test-python:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esdata
          POSTGRES_PASSWORD: esdata_test
          POSTGRES_DB: esdata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://esdata:esdata_test@localhost:5432/esdata_test
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/workers/requirements.txt
          pip install alembic
          pip install pytest pytest-asyncio httpx

      - name: Bootstrap database
        run: |
          psql "$DATABASE_URL" -f infra/sql/init.sql
          alembic upgrade heads
        env:
          PGPASSWORD: esdata_test

      - name: Run model data quality gate
        run: python scripts/maintenance/check_model_data_quality.py

      - name: Run model data quality regression test
        run: pytest scripts/tests/test_check_model_data_quality.py -q

      - name: Run MCP doc contracts gate
        run: python scripts/maintenance/verify-doc-contracts.py

      - name: Run MCP private regression tests
        run: python -m pytest apps/api/tests/test_mcp_private.py -q

      - name: Run MCP contract regression tests
        run: python -m pytest apps/api/tests/test_mcp_contract.py -q

      - name: Run MCP transport regression tests
        run: python -m pytest apps/api/tests/test_mcp_transport.py -q

      - name: Run MCP audit regression tests
        run: python -m pytest apps/api/tests/test_mcp_audit.py -q

      - name: Run prioritized HTTP MCP audit tests
        run: python -m pytest apps/api/tests/test_http_mcp_audit_phase_1_1.py -q

      - name: Run MCP factual regression tests
        run: python -m pytest apps/api/tests/test_mcp_truth_regressions.py -q

      - name: Run stdio MCP audit regression tests
        run: python -m pytest apps/api/tests/test_mcp_stdio_audit.py -q

      - name: Run Python tests
        run: pytest apps/api/tests/ apps/workers/tests/ -v --tb=short

  test-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esdata
          POSTGRES_PASSWORD: esdata_test
          POSTGRES_DB: esdata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://esdata:esdata_test@localhost:5432/esdata_test
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install alembic
          pip install pytest pytest-asyncio httpx

      - name: Bootstrap database
        run: |
          psql "$DATABASE_URL" -f infra/sql/init.sql
          alembic upgrade heads
        env:
          PGPASSWORD: esdata_test

      - name: Run integration tests
        run: pytest apps/api/tests/test_integration.py -v --tb=short -m integration

  eval-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: esdata
          POSTGRES_PASSWORD: esdata_test
          POSTGRES_DB: esdata_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://esdata:esdata_test@localhost:5432/esdata_test
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/workers/requirements.txt
          pip install alembic
          pip install pytest pytest-asyncio httpx

      - name: Bootstrap database
        run: |
          psql "$DATABASE_URL" -f infra/sql/init.sql
          alembic upgrade heads
        env:
          PGPASSWORD: esdata_test

      - name: Run eval quality gate
        run: |
          python scripts/eval/eval_phase3.py --local
        env:
          DATABASE_URL: postgresql://esdata:esdata_test@localhost:5432/esdata_test

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test
      - run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run secrets audit
        run: python scripts/maintenance/secrets_audit.py

      - name: Fail on forbidden env files and env docs drift
        run: python scripts/maintenance/verify-doc-artifacts.py

  docs-artifacts:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      ESDATA_API_KEY: test-secret-key
      MCP_API_KEY: test-mcp-key
      DATABASE_URL: sqlite:////tmp/esdata-doc-artifacts.sqlite3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install API dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run doc artifact tests
        run: pytest scripts/tests/test_verify_doc_artifacts.py -v --tb=short

      - name: Verify docs artifacts drift and broken links
        run: python scripts/maintenance/verify-doc-artifacts.py

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit API dependencies
        run: pip-audit -r apps/api/requirements.txt --fail-on=vulnerability

      - name: Audit workers dependencies
        run: pip-audit -r apps/workers/requirements.txt --fail-on=vulnerability

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --config .lychee.toml
            --no-progress
            --format detailed
            "docs/**/*.md"
        env:
          LYCHEE_CACHE_DIR: /tmp/lychee-cache
