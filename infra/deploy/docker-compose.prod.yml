services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-esdata}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - esdata-postgres:/var/lib/postgresql/data
      - ../../infra/sql/init.sql:/docker-entrypoint-initdb.d/010_init.sql:ro
      - ../../infra/sql/002_fulltext_search.sql:/docker-entrypoint-initdb.d/020_fulltext_search.sql:ro
      - ../../infra/sql/003_modelos_aeat.sql:/docker-entrypoint-initdb.d/030_modelos_aeat.sql:ro
      - ../../infra/sql/004_modelos_v2.sql:/docker-entrypoint-initdb.d/040_modelos_v2.sql:ro
      - ../../infra/sql/004_norma_classification.sql:/docker-entrypoint-initdb.d/050_norma_classification.sql:ro
      - ../../infra/sql/006_pgvector.sql:/docker-entrypoint-initdb.d/060_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esdata} -d ${POSTGRES_DB:-esdata}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      APP_ENV: ${APP_ENV:-production}
      ESDATA_API_KEY: ${ESDATA_API_KEY:?ESDATA_API_KEY is required}
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ESDATA_API_BASE_URL: ${ESDATA_API_BASE_URL:?ESDATA_API_BASE_URL is required}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker-boe:
    build:
      context: ../../apps/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BOE_API_BASE: ${BOE_API_BASE:-https://www.boe.es/datosabiertos/api/legislacion-consolidada}
      BOE_LEGISLACION_NORMAS: ${BOE_LEGISLACION_NORMAS:-LIVA,LIRPF,LIS,LGT,ITPAJD,IRNR,IIEE,HL,DAC6,DAC6RD,DAC6EU}
      SYNC_INTERVAL_SECONDS: ${BOE_SYNC_INTERVAL_SECONDS:-3600}
      WORKER_CMD: python boe.py
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker-dgt:
    build:
      context: ../../apps/workers
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DGT_SSL_VERIFY: ${DGT_SSL_VERIFY:-true}
      SYNC_INTERVAL_SECONDS: ${DGT_SYNC_INTERVAL_SECONDS:-604800}
      WORKER_CMD: python dgt.py
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
