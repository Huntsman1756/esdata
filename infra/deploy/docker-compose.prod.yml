  backup:
    image: postgres:16-alpine@sha256:1e3604a950df9588c86b955a1e4be0887900210b5c49985ee275c4c2c689cf73
    profiles: ["prod"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - esdata-postgres:/var/lib/postgresql/data:ro
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -h postgres -U ${POSTGRES_USER:-esdata} ${POSTGRES_DB:-esdata}
        | gzip > /backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz;
        find /backups -name '*.sql.gz' -mtime +7 -delete;
        sleep 86400;
      done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

  ops:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.ops
    profiles: ["prod", "ops"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - esdata-internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: ["prod"]
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    pid: host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    profiles: ["prod"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - esdata-internal

  alertmanager:
    # [PARTIAL] Plantilla scaffold. Antes de habilitar perfil "prod" en
    # produccion, configurar receiver real en infra/observability/alertmanager.yml
    # (ver TODO en ese fichero). Mientras tanto el receiver default apunta a
    # localhost:9099/noop y solo absorbe alertas sin notificar.
    image: prom/alertmanager:v0.28.1
    profiles: ["prod"]
    volumes:
      - ../observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana@sha256:7d5faae481a4c6f436c99e98af11534f7fd5e8d3e35213552dd1dd02bc393d2e
    profiles: ["prod"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://tudominio.com/grafana/}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_SERVE_FROM_DISK_PATH=/var/lib/grafana/dashboards
      - GF_SERVER_ROUTING_REMOVE_SERVING_ADDRESS_HEADER=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - postgres
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

volumes:
  esdata-postgres:
  caddy-data:
  caddy-config:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  esdata-internal:
    driver: bridge
