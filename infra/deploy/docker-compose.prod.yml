    build:
      context: ../..
      dockerfile: apps/workers/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ESDATA_API_KEY: ${ESDATA_API_KEY:?ESDATA_API_KEY is required}
      ESDATA_API_URL: ${ESDATA_API_URL:-http://api:8000}
      MONITOR_INTERVAL: ${HERMES_MONITOR_INTERVAL:-300}
      AUTO_RESTART_ENABLED: ${HERMES_AUTO_RESTART_ENABLED:-false}
      RESTART_ALLOWLIST: ${HERMES_RESTART_ALLOWLIST:-}
      PYTHONUNBUFFERED: "1"
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - esdata-internal
    command: python hermes_monitor.py --daemon
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  backup:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    profiles: ["prod"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-esdata}
      POSTGRES_DB: ${POSTGRES_DB:-esdata}
    volumes:
      - esdata-postgres:/var/lib/postgresql/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "test $(ls -1 /backups/*.sql.gz 2>/dev/null | wc -l) -gt 0"]
      interval: "24h"
      timeout: 10s
      retries: 3
      start_period: 5m

  ops:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.ops
    profiles: ["prod", "ops"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ESDATA_API_KEY: ${ESDATA_API_KEY:?ESDATA_API_KEY is required}
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY is required}
      ESDATA_API_URL: ${ESDATA_API_URL:-http://api:8000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - esdata-internal

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: ["prod"]
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    pid: host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    profiles: ["prod"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - esdata-internal

  alertmanager:
    image: prom/alertmanager:v0.28.1
    profiles: ["prod"]
    environment:
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ../observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets/alertmanager:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        if [ -n "${TELEGRAM_CHAT_ID:-}" ] && [ "${TELEGRAM_CHAT_ID:-}" != "0" ] && [ -s /etc/alertmanager/secrets/telegram_bot_token ]; then
          sed "s|__TELEGRAM_CHAT_ID__|${TELEGRAM_CHAT_ID}|g" /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        else
          cat > /tmp/alertmanager.yml <<'EOF'
        global:
          resolve_timeout: 5m
        route:
          receiver: default-noop
        receivers:
          - name: default-noop
        EOF
        fi
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  grafana:
    image: grafana/grafana@sha256:7d5faae481a4c6f436c99e98af11534f7fd5e8d3e35213552dd1dd02bc393d2e
    profiles: ["prod"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://tudominio.com/grafana/}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_SERVE_FROM_DISK_PATH=/var/lib/grafana/dashboards
      - GF_SERVER_ROUTING_REMOVE_SERVING_ADDRESS_HEADER=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - postgres
    restart: unless-stopped
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

volumes:
  esdata-postgres:
  caddy-data:
  caddy-config:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  esdata-internal:
    driver: bridge
