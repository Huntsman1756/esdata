services:
  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - esdata-internal
    security_opt:
      - no-new-privileges:true

  postgres:
    image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-esdata}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - esdata-postgres:/var/lib/postgresql/data
      - ../../infra/sql/init.sql:/docker-entrypoint-initdb.d/010_init.sql:ro
    networks:
      - esdata-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esdata} -d ${POSTGRES_DB:-esdata}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # PgBouncer: pooling de conexiones [PARTIAL] opt-in.
  # Activar con: docker compose --profile pgbouncer up -d pgbouncer
  # Despues, editar .env DATABASE_URL para apuntar a pgbouncer:6432 con
  # ?prepare_threshold=0 (psycopg3). Ver infra/deploy/pgbouncer/pgbouncer.ini.
  # Userlist real (con hash SCRAM) se monta desde infra/deploy/pgbouncer/userlist.txt
  # (gitignored). Generar segun instrucciones en userlist.txt.example.
  pgbouncer:
    # TODO[pin-digest]: fijar por sha256 tras validacion en staging.
    image: edoburu/pgbouncer:1.23.1
    profiles: ["pgbouncer"]
    restart: unless-stopped
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-esdata}"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    # Sin port mapping: pgbouncer solo accesible desde la red interna del compose.

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      APP_ENV: ${APP_ENV:-production}
      ESDATA_API_KEY: ${ESDATA_API_KEY:?ESDATA_API_KEY is required}
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    networks:
      - esdata-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ESDATA_API_BASE_URL: ${ESDATA_API_BASE_URL:?ESDATA_API_BASE_URL is required}
      ESDATA_API_KEY: ${ESDATA_API_KEY:?ESDATA_API_KEY is required}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    networks:
      - esdata-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker-boe:
    build:
      context: ../..
      dockerfile: apps/workers/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BOE_API_BASE: ${BOE_API_BASE:-https://www.boe.es/datosabiertos/api/legislacion-consolidada}
      BOE_LEGISLACION_NORMAS: ${BOE_LEGISLACION_NORMAS:-LIVA,LIRPF,LIS,LGT,ITPAJD,IRNR,IIEE,HL,DAC6,DAC6RD,DAC6EU}
      SYNC_INTERVAL_SECONDS: ${BOE_SYNC_INTERVAL_SECONDS:-3600}
      WORKER_CMD: python boe.py
      WORKER_REQUEST_DELAY: ${WORKER_REQUEST_DELAY:-1.0}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - esdata-internal
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker_heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/worker_heartbeat))) -lt 300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker-dgt:
