    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      WORKER_CMD: python aeat_models.py --run-once
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - esdata-internal
    security_opt:
