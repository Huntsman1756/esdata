      WORKER_CMD: python sepblac.py --run-once

  ops:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.ops
    profiles: ["ops"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  esdata-postgres:
  caddy-data:
  caddy-config:
