; PgBouncer config para esdata.
;
; [PARTIAL] Despliegue opt-in: el servicio se levanta con `--profile pgbouncer`
; y NO esta enchufado por defecto. Para activarlo en runtime, cambiar
; DATABASE_URL en `.env` (ver docs/deployment/server-installation.md:45).
;
; Driver actual del proyecto: psycopg3 (`postgresql+psycopg://`).
; URL recomendada cuando se enchufe pgbouncer:
;   postgresql+psycopg://esdata:<password>@pgbouncer:6432/esdata?prepare_threshold=0
;
; - `prepare_threshold=0` desactiva los prepared statements server-side de
;   psycopg3, requisito para transaction pooling. Sin esto, falla en cuanto
;   una sentencia se ejecuta >5 veces (se prepara y la siguiente conexion del
;   pool no la conoce).
; - Workers que usen SET/LISTEN/NOTIFY o session-state no son compatibles con
;   transaction pooling. Revisar antes de migrar workers individuales.
; - Mantener postgres directo como fallback durante validacion (rollback = revertir
;   DATABASE_URL en `.env` y reiniciar api+workers).
;
; Auditoria: PgBouncer no rota log a fichero por defecto en este compose; los
; eventos van a stdout (recogidos por docker logs y agregables a Loki/Promtail).

[databases]
esdata = host=postgres port=5432 dbname=esdata auth_user=esdata

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Auth via SCRAM passthrough: PgBouncer pide credenciales al usuario y las
; verifica contra `auth_query` ejecutado como `auth_user`.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling: cada transaccion toma una conexion del pool y la libera
; al COMMIT/ROLLBACK. Maximiza reuso, incompatible con session state.
pool_mode = transaction

; Limites: 500 clientes simultaneos contra 20 conexiones reales por DB y
; 5 reservadas para emergencias. Total max conexiones a Postgres: 25.
max_client_conn = 500
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 25
max_user_connections = 25

; Timeouts conservadores. Cancelar queries que excedan 5 minutos.
server_idle_timeout = 600
server_lifetime = 3600
query_timeout = 300
query_wait_timeout = 120
client_idle_timeout = 0

; Sin TLS interno: la red `esdata-internal` es bridge privada del compose.
; Si se expone fuera del host, anadir server_tls_sslmode = verify-full.

; Logging a stdout (recogido por `docker logs`).
admin_users = esdata
stats_users = esdata
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
verbose = 0

; Tamano del paquete: alinear con max de Postgres por defecto.
pkt_buf = 8192
