groups:
  - name: esdata.workers
    rules:
      - alert: WorkerSilent
        expr: worker_lag_seconds > 172800
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.worker }} sin sync en >48h"
          description: "El worker {{ $labels.worker }} no registra ejecuciones recientes en sync_log desde hace mas de 48 horas."

      - alert: WorkerSyncErrors
        expr: worker_last_errors{worker!="worker-modelos"} > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.worker }} tiene errores en sync_log"
          description: "La ultima fila de sync_log para {{ $labels.worker }} reporta {{ $value }} errores."

      - alert: WorkerFetchErrorsDetected
        expr: worker_sync_summary{kind="fetch_errors"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker {{ $labels.worker }} tiene fetch_errors en el ultimo sync"
          description: "La ultima ejecucion visible en /metrics para {{ $labels.worker }} reporta {{ $value }} fetch_errors en el resumen estructurado del sync."

      - alert: EurlexNoIndexHigh
        expr: worker_sync_summary{worker=~"worker-eurlex|cron-eurlex-weekly",kind="no_index"} > 25
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "EUR-Lex mantiene no_index alto en {{ $labels.worker }}"
          description: "El resumen estructurado de {{ $labels.worker }} reporta {{ $value }} bloques/CELEX sin indice util. Revisar retrieval oficial y consolidaciones candidatas."

      - alert: APIDown
        expr: up{job="esdata_api"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: esdata API no responde
          description: Prometheus no puede scrapear /metrics en la API durante al menos 5 minutos.

      - alert: DiskUsageHigh
        expr: |
          (
            node_filesystem_size_bytes{job="host",fstype!="",mountpoint="/"}
            - node_filesystem_avail_bytes{job="host",fstype!="",mountpoint="/"}
          ) / node_filesystem_size_bytes{job="host",fstype!="",mountpoint="/"} > 0.85
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Disco al {{ $value | humanizePercentage }} en {{ $labels.mountpoint }}"
          description: "El host del VPS supera el 85% de uso de disco en {{ $labels.mountpoint }}."
