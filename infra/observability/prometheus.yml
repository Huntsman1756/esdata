global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager esta declarado. En produccion notifica por Telegram solo si
# existe token montado y TELEGRAM_CHAT_ID no esta vacio; si faltan, el
# contenedor arranca con receiver noop para no entrar en restart loop.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: esdata_api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: host
    static_configs:
      - targets: ['node-exporter:9100']
