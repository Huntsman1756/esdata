global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Alertmanager esta declarado pero como [PARTIAL]: el receiver real no
# esta configurado en infra/observability/alertmanager.yml. Las alertas
# se enrutan pero no se notifican aun.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: esdata_api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: host
    static_configs:
      - targets: ['node-exporter:9100']
