# Alertmanager configurado para Telegram.
#
# Los secretos se inyectan en produccion via .env.prod y se expanden al renderizar
# esta plantilla en el VPS. No almacenar tokens reales en el repo.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ .Status | toUpper }}</b> {{ .CommonLabels.alertname }}
          {{- if .CommonLabels.worker }}
          Worker: <code>{{ .CommonLabels.worker }}</code>
          {{- end }}

          {{- range .Alerts }}
          - {{ .Annotations.summary }}
          {{- if .Annotations.description }}
            {{ .Annotations.description }}
          {{- end }}
          {{- end }}

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
