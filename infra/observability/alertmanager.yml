# Alertmanager configuration for esdata observability.
#
# Secrets are injected at runtime via mounted secret files. Never commit real
# tokens to the repository.
#
# Telegram secret files required in the Alertmanager container:
#   /etc/alertmanager/secrets/telegram_bot_token
#
# The chat id is rendered from TELEGRAM_CHAT_ID by docker-compose before
# Alertmanager starts because prom/alertmanager:v0.28.1 supports
# bot_token_file but not chat_id_file.

global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: telegram
      repeat_interval: 1h

receivers:
  - name: default-noop

  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ .Status | toUpper }}</b> {{ .CommonLabels.alertname }}
          {{- if eq .Status "resolved" }}
          <i>Estado actual: alerta resuelta. El detalle inferior describe la ultima condicion que la disparo.</i>
          {{- end }}
          {{- if .CommonLabels.worker }}
          Worker: <code>{{ .CommonLabels.worker }}</code>
          {{- end }}

          {{- range .Alerts }}
          - {{ .Annotations.summary }}
          {{- if .Annotations.description }}
            {{ .Annotations.description }}
          {{- end }}
          {{- end }}

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
