# Alertmanager configuration for esdata observability.
#
# Secrets are injected at runtime via environment variables (TELEGRAM_BOT_TOKEN,
# TELEGRAM_CHAT_ID, SMTP_*). Never commit real tokens to the repository.
#
# Default route sends to `telegram` (demo). Configure Telegram or any other
# receiver by setting the corresponding env vars.
#
# Variables requeridas para Telegram:
#   TELEGRAM_BOT_TOKEN  — Token del bot de Telegram (obtener de @BotFather)
#   TELEGRAM_CHAT_ID    — ID del chat/grupo destino (obtener de @getmyID_bot)
#
# Receivers opcionales (email, webhook): descomentar y configurar env vars.

global:
  resolve_timeout: 5m

route:
  # Default: Telegram notifications (demo mode).
  # Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID env vars.
  receiver: telegram
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: telegram
      repeat_interval: 1h

receivers:
  # --- Noop receiver (safe default) -----------------------------------------
  - name: default-noop
    # No notification channels. Alerts are acknowledged but not delivered.
    # This is the safe default to prevent accidental notifications.

  # --- Telegram receiver ----------------------------------------------------
  # Un-comment and set TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID to enable.
  # These env vars are injected from compose.env / compose.env.prod.
  - name: telegram
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ .Status | toUpper }}</b> {{ .CommonLabels.alertname }}
          {{- if eq .Status "resolved" }}
          <i>Estado actual: alerta resuelta. El detalle inferior describe la ultima condicion que la disparo.</i>
          {{- end }}
          {{- if .CommonLabels.worker }}
          Worker: <code>{{ .CommonLabels.worker }}</code>
          {{- end }}

          {{- range .Alerts }}
          - {{ .Annotations.summary }}
          {{- if .Annotations.description }}
            {{ .Annotations.description }}
          {{- end }}
          {{- end }}

  # --- Email receiver -------------------------------------------------------
  # Un-comment and set SMTP_* env vars to enable email notifications.
  # Required env vars: SMTP_HOST, SMTP_PORT, SMTP_FROM, SMTP_AUTH_USER, SMTP_AUTH_PASSWORD
  - name: email
    email_configs:
      - to: ${SMTP_TO}
        from: ${SMTP_FROM}
        smarthost: ${SMTP_HOST}:${SMTP_PORT}
        auth_username: ${SMTP_AUTH_USER}
        auth_password: ${SMTP_AUTH_PASSWORD}
        send_resolved: true
        headers:
          Subject: '[esdata] {{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'

  # --- Webhook receiver (custom integrations) --------------------------------
  # Un-comment and set WEBHOOK_URL to forward alerts to any HTTP endpoint
  # (e.g., Slack incoming webhook, Discord webhook, custom bot).
  - name: webhook
    webhook_configs:
      - url: ${WEBHOOK_URL}
        send_resolved: true
        http_config:
          # Optional: add auth headers for protected endpoints
          # authorization:
          #   credentials: ${WEBHOOK_AUTH_TOKEN}

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
